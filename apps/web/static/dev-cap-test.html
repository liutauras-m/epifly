<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Capability Test</title>
<style>
  body { font-family: system-ui; padding: 20px; background: #f5f5f5; }
  pre { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 12px; white-space: pre-wrap; word-break: break-all; font-size: 13px; }
  button { background: #e85d04; color: #fff; border: none; border-radius: 8px; padding: 12px 20px; font-size: 16px; cursor: pointer; margin: 4px; }
  h2 { margin-top: 20px; font-size: 16px; color: #555; }
</style>
</head>
<body>
<h1>Capability Test</h1>
<button onclick="test('what time is it?')">What time is it?</button>
<button onclick="test('what is 12 + 7?')">Math question</button>
<h2>Response:</h2>
<pre id="out">Press a button to test…</pre>
<script>
async function test(msg) {
  const out = document.getElementById('out');
  out.textContent = 'Sending: ' + msg + '\n\n';
  try {
    const res = await fetch('/v1/agent/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: [{ role: 'user', content: msg }], stream: false })
    });
    const text = await res.text();
    out.textContent += 'Status: ' + res.status + '\n\n' + text;
  } catch(e) {
    out.textContent += 'Error: ' + e.message;
  }
}
if (new URLSearchParams(location.search).get('run')) test(decodeURIComponent(new URLSearchParams(location.search).get('run')));
</script>
</body>
</html>
