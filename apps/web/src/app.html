<!doctype html>
<html lang="en" data-theme="paper">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<meta name="color-scheme" content="light dark">
	<meta name="theme-color" content="#FF6200">
	<link rel="icon" href="/favicon.svg" type="image/svg+xml">
	<link rel="icon" href="/favicon-32x32.png" sizes="32x32" type="image/png">
	<link rel="icon" href="/favicon-16x16.png" sizes="16x16" type="image/png">
	<link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">
	<link rel="manifest" href="/site.webmanifest">
	<script>
		(function () {
			var t = localStorage.getItem('conusai-theme') || 'paper';
			document.documentElement.setAttribute('data-theme', t);
		})();
	</script>
	<script>
		/* Platform detection — sets data-platform on <html> before hydration (Phase 5.1) */
		(function(){
			var ua = navigator.userAgent;
			var p = navigator.platform || '';
			var t = navigator.maxTouchPoints || 0;
			var platform =
				(/iPad|iPhone|iPod/.test(ua) || (p === 'MacIntel' && t > 1)) ? 'ios' :
				/Android/.test(ua) ? 'android' :
				(/MacIntel/.test(p) && t === 0) ? 'macos' :
				/Win/.test(p) ? 'windows' :
				/Linux/.test(p) ? 'linux' : 'web';
			document.documentElement.dataset.platform = platform;
			if ('__TAURI_INTERNALS__' in window) {
				document.documentElement.dataset.tauri = 'true';
			}
		})();
	</script>
	%sveltekit.head%
</head>
<body>
	<div style="display:contents">%sveltekit.body%</div>
</body>
</html>
