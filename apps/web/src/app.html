<!doctype html>
<html lang="en" data-theme="paper">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<meta name="color-scheme" content="light dark">
	<link rel="icon" href="/images/favicon.png" type="image/png">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
	<link rel="preconnect" href="https://api.fontshare.com">
	<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
	<link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600&display=swap" rel="stylesheet">
	<script>
		(function () {
			var t = localStorage.getItem('conusai-theme') || 'paper';
			document.documentElement.setAttribute('data-theme', t);
		})();
	</script>
	%sveltekit.head%
</head>
<body>
	<div style="display:contents">%sveltekit.body%</div>
</body>
</html>
