schema_version = "2.0"
name        = "wasm-ping"
version     = "0.1.0"
namespace   = "compute.debug.wasm_ping"
category    = "compute"
kind        = "wasm"
enabled     = false
description = "Minimal WASM capability demonstrating the WASM runtime type. Exports a ping tool that returns an integer result via WebAssembly execution."
tags        = ["demo", "wasm", "test"]
emits       = ["application/json"]
idempotent  = true
requires    = []
search_keywords = ["wasm", "ping", "wasm-ping", "webassembly", "wasm ping", "ping test", "42"]

[[tools]]
name = "ping"
description = "Returns 42 as a proof-of-execution from the WASM runtime."

[tools.input_schema]
type = "object"
required = []

[tools.input_schema.properties.name]
type = "string"
description = "Optional label (echoed back in response)"

[config]
wasm_module = "wasm_ping.wasm"
