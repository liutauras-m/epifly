<div class="composer-wrap">
  <form class="composer" data-composer>
    <div class="attachments" data-attachments></div>
    <label class="sr-only" for="prompt">Message</label>
    <textarea
      class="composer-input"
      name="prompt"
      placeholder="How can I help you today?"
      rows="2"
      data-input
      autocomplete="off"></textarea>
    <div class="composer-toolbar">
      <button type="button" class="toolbar-btn" data-attach aria-label="Attach file">
        <svg class="icon"><use href="/assets/icons/icons.svg#i-paperclip"/></svg>
      </button>
      <input type="file" hidden multiple data-file-input>
      <div class="toolbar-spacer"></div>
      <button type="button" class="model-pill" data-model>
        <span data-model-label>Opus 4.7 Adaptive</span>
        <svg class="chevron"><use href="/assets/icons/icons.svg#i-more"/></svg>
      </button>
      <button type="button" class="icon-btn" aria-label="Voice (coming soon)">
        <svg class="icon"><use href="/assets/icons/icons.svg#i-mic"/></svg>
      </button>
      <button type="submit" class="send-btn" aria-label="Send" data-send>
        <svg class="icon"><use href="/assets/icons/icons.svg#i-arrow-up"/></svg>
      </button>
    </div>
  </form>
</div>
