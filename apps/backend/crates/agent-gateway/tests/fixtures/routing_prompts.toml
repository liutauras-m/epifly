# Routing-quality regression fixtures (PR 4.1).
#
# Each case asserts that `CapabilityRegistry::lexical_hint_capabilities(prompt, tenant)`
# returns a list containing `expected_capability`. The lexical hints are sourced
# from each capability's `[[tools]].search_keywords` (or top-level `search_keywords`)
# in `apps/backend/capabilities/*/capability.toml` — so this suite catches
# regressions when keywords are added/removed and helps catch missing keywords
# for the symptoms documented in `docs/plan.md` §0.
#
# Test harness: `tests/routing_quality.rs`.
# Pass criterion: at least 27/30 base prompts must pass.

[[case]]
id = "delete-vague"
prompt = "delete the meeting-notes file"
expected_capability = "storage-workspace"
expected_tool = "delete_node"

