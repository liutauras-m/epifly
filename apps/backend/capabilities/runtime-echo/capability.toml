schema_version = "2.0"
name        = "runtime-echo"
version     = "0.1.0"
namespace   = "compute.debug.echo"
category    = "compute"
kind        = "chain"
description = "Echo tool that repeats a message back. Used for testing and debugging the agent pipeline."
tags        = ["echo", "runtime", "test", "debug"]
emits       = ["application/json"]
idempotent  = true
requires    = []
search_keywords = ["echo", "repeat", "test", "ping", "debug message"]

[[tools]]
name = "echo"
description = "Echo the input back"

[tools.input_schema]
type = "object"
required = ["message"]

[tools.input_schema.properties.message]
type = "string"
description = "Text to echo back"

[chain]
model = "claude-opus-4-7"
system_prompt = "You are an echo tool. Repeat back exactly what the user says."
prompt_template = "Echo: {{input.message}}"
max_tokens = 128