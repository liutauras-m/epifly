schema_version = "2.0"
name        = "file-storage"
version     = "0.1.0"
namespace   = "storage.object"
category    = "storage"
description = "S3-compatible object storage (RustFS/AWS S3). Upload, download, list, delete objects and generate presigned URLs."
kind        = "mcp"
tags        = ["storage", "s3", "files", "upload", "download"]
accepts     = [{ mime = "*" }]
emits       = ["application/json"]
idempotent  = false
search_keywords = [
    "upload file", "download file", "store file", "save file", "object storage",
    "S3", "RustFS", "bucket", "presigned URL", "file access", "file sharing",
]

[[tools]]
name = "upload_file"
description = "Upload a file to object storage and return its key."
search_keywords = ["upload", "attach file", "store file", "put file", "send file"]

[tools.input_schema]
type = "object"
required = ["local_path", "key"]

[tools.input_schema.properties.local_path]
type = "string"

[tools.input_schema.properties.key]
type = "string"

[tools.input_schema.properties.bucket]
type = "string"

[[tools]]
name = "download_file"
description = "Download a file from object storage to a local path."

[tools.input_schema]
type = "object"
required = ["key", "local_path"]

[tools.input_schema.properties.key]
type = "string"

[tools.input_schema.properties.local_path]
type = "string"

[tools.input_schema.properties.bucket]
type = "string"

[[tools]]
name = "presigned_url"
description = "Generate a presigned URL for temporary public access to an object."
search_keywords = ["presigned url", "presigned link", "temporary link", "share file link", "file sharing url"]

[tools.input_schema]
type = "object"
required = ["key"]

[tools.input_schema.properties.key]
type = "string"

[tools.input_schema.properties.expires_secs]
type = "integer"
default = 3600

[tools.input_schema.properties.bucket]
type = "string"

[config]
endpoint = "${S3_ENDPOINT}"
bucket = "${S3_BUCKET}"
