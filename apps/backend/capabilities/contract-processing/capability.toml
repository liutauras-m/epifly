schema_version = "2.0"
name        = "contract-processing"
version     = "1.0.0"
namespace   = "extract.fields.contract"
category    = "extract"
kind        = "chain"
description = "Structured extraction from contract and legal documents. Returns ContractData: parties, effective date, term, governing law, key obligations, termination clauses, and signatories. Call when the user uploads an agreement, NDA, SLA, MSA, or asks to review a contract."
tags        = ["contract", "legal", "agreement", "structured-extraction", "vision", "document"]
accepts     = [
    { mime = "application/pdf", max_size_mb = 20 },
    { mime = "image/*", max_size_mb = 20 },
]
emits       = ["application/json"]
idempotent  = true
cost_hint   = { dollars = 0.05, latency_ms = 5000 }
requires    = []
search_keywords = [
    "contract", "agreement", "NDA", "non-disclosure", "SLA", "MSA", "SOW",
    "service agreement", "legal document", "terms and conditions", "T&C",
    "clause extraction", "parties", "signatories", "governing law",
    "extract contract", "parse contract", "review contract", "analyse contract",
    "employment agreement", "lease agreement", "license agreement",
]

[[tools]]
name        = "extract_contract"
description = "Extract complete structured fields from a contract or legal document in a single call. Input: document_path — local path or URL (PNG, JPEG, JPG, PDF). Output: ContractData JSON with parties, effective_date, expiry_date, term_months, governing_law, jurisdiction, contract_type, key_obligations, termination_clauses, payment_terms, signatories, and summary."

[tools.input_schema]
type     = "object"
required = ["document_path"]

[tools.input_schema.properties.document_path]
type        = "string"
description = "Absolute local path or http/https URL to the contract document (PNG, JPEG, JPG, PDF)"

[[tools]]
name        = "summarise_contract"
description = "Produce a plain-language summary of a contract for non-legal stakeholders. Input: contract_data — ContractData JSON from extract_contract. Output: { summary, risk_flags, action_items }."

[tools.input_schema]
type     = "object"
required = ["contract_data"]

[tools.input_schema.properties.contract_data]
type        = "object"
description = "ContractData JSON previously returned by extract_contract"

[chain]
model           = "smart"
vision          = true
max_tokens      = 2048
system_prompt   = "You are a legal document analysis specialist. Extract structured data from contracts with high accuracy. Always respond with valid JSON only."
prompt_template = """Extract all contract information from the attached legal document.
Return a valid JSON object matching exactly this structure — use null for missing scalar fields, empty arrays [] for missing lists:
{
  "contract_type": string|null,
  "parties": [{"name": string, "role": string|null, "address": string|null}],
  "effective_date": string|null,
  "expiry_date": string|null,
  "term_months": number|null,
  "governing_law": string|null,
  "jurisdiction": string|null,
  "key_obligations": [string],
  "termination_clauses": [string],
  "payment_terms": string|null,
  "signatories": [string],
  "summary": string|null
}
Respond ONLY with the JSON object, no markdown fences, no explanation."""

[chain.output_schema]
type     = "object"
required = ["parties"]

[chain.output_schema.properties.parties]
type  = "array"
items = { type = "object", required = ["name"] }

[chain.output_schema.properties.contract_type]
type = ["string", "null"]

[config]
max_document_size_mb = 20
supported_formats    = ["png", "jpeg", "jpg", "pdf"]
