schema_version = "2.0"
name        = "storage-ensure-date-folder"
version     = "0.1.0"
namespace   = "storage.object.ensure_date_folder"
category    = "storage"
kind        = "native"
description = "Create a date-partitioned directory ({base}/{YYYY}/{MM}/{DD}/) for the current UTC date."
tags        = ["storage", "folder", "date", "partition", "mkdir"]
accepts     = ["application/json"]
emits       = ["application/json"]
idempotent  = true
requires    = []
search_keywords = ["date folder", "date partition", "daily directory"]

[[tools]]
name = "ensure_date_folder"
description = "Create a YYYY/MM/DD directory under base_path for today's UTC date. Returns the relative path."

[tools.input_schema]
type = "object"

[tools.input_schema.properties.base_path]
type = "string"
description = "Base directory to partition under. Defaults to 'uploads'."

[config]
op = "ensure_date_folder"
