schema_version = "2.0"
name        = "storage-list-folders"
version     = "0.1.0"
namespace   = "storage.object.list"
category    = "storage"
kind        = "native"
description = "List files and subdirectories under a workspace path prefix."
tags        = ["storage", "list", "directories", "browse", "folders"]
accepts     = ["application/json"]
emits       = ["application/json"]
idempotent  = true
requires    = []
search_keywords = ["list", "browse", "directory", "files", "ls", "list folders"]

[[tools]]
name = "list_folders"
description = "List entries (files and dirs) under a workspace prefix. Returns name and kind for each."

[tools.input_schema]
type = "object"

[tools.input_schema.properties.prefix]
type = "string"
description = "Workspace-relative prefix to list under. Defaults to workspace root."

[config]
op = "list_folders"
