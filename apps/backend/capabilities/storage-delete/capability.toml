schema_version = "2.0"
name        = "storage-delete"
version     = "0.1.0"
namespace   = "storage.node.delete"
category    = "storage"
kind        = "native"
description = "Delete a workspace node (folder or conversation/file) by ULID or by name."
tags        = ["storage", "delete", "remove", "workspace"]
accepts     = ["application/json"]
emits       = ["application/json"]
idempotent  = false
requires    = []
search_keywords = ["delete", "remove", "trash", "drop file", "drop folder"]

[[tools]]
name = "delete_node"
description = "Delete a workspace folder or document. Provide either the node ULID (`id`) or a human-readable `name`; when `name` is supplied the server resolves it via a workspace search and prefers an exact case-insensitive match."

[tools.input_schema]
type = "object"

[tools.input_schema.properties.id]
type = "string"
description = "ULID of the workspace node to delete. Mutually exclusive with `name` (id wins if both are set)."

[tools.input_schema.properties.name]
type = "string"
description = "Human-readable node name (e.g. \"Projects\" or \"meeting.md\"). The server resolves this to a ULID."

[config]
op = "delete_node"
