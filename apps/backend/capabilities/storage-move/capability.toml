schema_version = "2.0"
name        = "storage-move"
version     = "0.1.0"
namespace   = "storage.object.move"
category    = "storage"
kind        = "native"
description = "Move (rename) a file within the tenant workspace."
tags        = ["storage", "move", "rename", "object"]
accepts     = ["application/json"]
emits       = ["application/json"]
idempotent  = false
requires    = []
search_keywords = ["move", "rename", "relocate file"]

[[tools]]
name = "move_object"
description = "Move a file from one workspace path to another. Parent directories of the destination are created automatically."

[tools.input_schema]
type = "object"
required = ["from", "to"]

[tools.input_schema.properties.from]
type = "string"
description = "Source workspace-relative path"

[tools.input_schema.properties.to]
type = "string"
description = "Destination workspace-relative path"

[config]
op = "move_object"
