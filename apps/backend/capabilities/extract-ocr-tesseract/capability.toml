schema_version = "2.0"
name        = "extract-ocr-tesseract"
version     = "0.1.0"
namespace   = "extract.text.ocr_tesseract"
category    = "extract"
kind        = "wasm"
enabled     = false
description = "Extract text from images using Tesseract OCR via WebAssembly — fast, offline, low cost."
tags        = ["ocr", "tesseract", "text extraction", "image", "offline"]
accepts     = ["image/*"]
emits       = ["application/json"]
idempotent  = true
cost_hint   = "low"
requires    = []
search_keywords = ["tesseract", "ocr", "image text", "offline ocr"]

[[tools]]
name = "extract_text"
description = "Run Tesseract OCR on an image file. Returns extracted text with per-word confidence scores."

[tools.input_schema]
type = "object"
required = ["image_path"]

[tools.input_schema.properties.image_path]
type = "string"
description = "Workspace-relative path to the image file"

[tools.input_schema.properties.language]
type = "string"
description = "Tesseract language pack to use (default: eng)"

[config]
wasm_module = "tesseract_ocr.wasm"
