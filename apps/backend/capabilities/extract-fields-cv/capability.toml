schema_version = "2.0"
name        = "extract-fields-cv"
version     = "1.0.0"
namespace   = "extract.fields.cv"
category    = "extract"
kind        = "chain"
description = "Structured extraction from CVs, resumes, and professional profiles. Returns CandidateData JSON: personal details, contact info, work experience, education, skills, certifications, and languages. Call when the user uploads a resume or asks to screen, score, or compare candidates."
tags        = ["cv", "resume", "candidate", "hr", "talent", "structured-extraction", "vision", "document"]
accepts     = [
    { mime = "application/pdf", max_size_mb = 10 },
    { mime = "image/*", max_size_mb = 10 },
    { mime = "text/plain", max_size_mb = 1 },
]
emits       = ["application/json"]
idempotent  = true
cost_hint   = { dollars = 0.03, latency_ms = 4000 }
requires    = []
search_keywords = [
    "cv", "resume", "curriculum vitae", "candidate", "applicant",
    "job application", "screen resume", "score cv", "rank candidates",
    "work experience", "skills", "education", "qualifications",
    "extract cv", "parse resume", "read cv", "hr", "talent acquisition",
    "shortlist", "hiring", "recruitment",
]

[[tools]]
name        = "extract_cv"
description = "Extract complete structured fields from a CV or resume. Input: image_path — local path or URL (PNG, JPEG, JPG, PDF, or text file). Output: CandidateData JSON with name, contact, summary, experience, education, skills, certifications, and languages."

[tools.input_schema]
type     = "object"
required = ["image_path"]

[tools.input_schema.properties.image_path]
type        = "string"
description = "Absolute local path or http/https URL to the CV document or image"

[tools.input_schema.properties.job_context]
type        = "string"
description = "Optional job title or role context for relevance scoring (e.g. 'Senior Rust Engineer')"

[[tools]]
name        = "score_cv"
description = "Score a CandidateData object against a job specification. Returns a relevance score (0-100), a ranked skills match, experience level assessment, and a brief hiring recommendation. Input: candidate_data (from extract_cv), job_spec (string describing the role requirements). Output: { score, skills_match, experience_level, recommendation, strengths, gaps }."

[tools.input_schema]
type     = "object"
required = ["candidate_data", "job_spec"]

[tools.input_schema.properties.candidate_data]
type        = "object"
description = "CandidateData JSON from extract_cv"

[tools.input_schema.properties.job_spec]
type        = "string"
description = "Job description or requirements text to score against"

[chain]
model           = "smart"
vision          = true
max_tokens      = 3000
system_prompt   = "You are a senior HR specialist and technical recruiter. You extract structured candidate information from CVs and resumes with high accuracy. Always respond with valid JSON only. Use null for missing scalar fields, empty arrays [] for missing lists."
prompt_template = """Extract all candidate information from the attached CV or resume.
{{#if input.job_context}}Role context for relevance scoring: {{input.job_context}}{{/if}}

Return a valid JSON object matching exactly this structure:
{
  "name": string|null,
  "email": string|null,
  "phone": string|null,
  "location": string|null,
  "linkedin_url": string|null,
  "github_url": string|null,
  "portfolio_url": string|null,
  "professional_summary": string|null,
  "total_experience_years": number|null,
  "current_title": string|null,
  "current_company": string|null,

  "experience": [
    {
      "title": string,
      "company": string,
      "location": string|null,
      "start_date": string|null,
      "end_date": string|null,
      "is_current": boolean,
      "description": string|null,
      "achievements": [string]
    }
  ],

  "education": [
    {
      "degree": string|null,
      "field": string|null,
      "institution": string,
      "year_graduated": number|null,
      "gpa": string|null
    }
  ],

  "skills": {
    "technical": [string],
    "languages_programming": [string],
    "tools_frameworks": [string],
    "soft_skills": [string]
  },

  "certifications": [
    { "name": string, "issuer": string|null, "year": number|null }
  ],

  "languages": [
    { "language": string, "proficiency": string|null }
  ],

  "publications": [string],
  "awards": [string]
}
Respond ONLY with the JSON object, no markdown fences, no explanation."""

[chain.output_schema]
type     = "object"
required = ["name", "experience", "skills"]

[chain.output_schema.properties.name]
type = ["string", "null"]

[chain.output_schema.properties.experience]
type  = "array"
items = { type = "object", required = ["company"] }

[chain.output_schema.properties.skills]
type = "object"

[config]
max_document_size_mb = 10
supported_formats    = ["png", "jpeg", "jpg", "pdf", "txt"]
