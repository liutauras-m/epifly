schema_version = "2.0"
name        = "storage-create-folder"
version     = "0.1.0"
namespace   = "storage.folder.create"
category    = "storage"
kind        = "native"
description = "Create a new empty folder in the user's workspace tree (visible in the sidebar). Prefer this over `storage-ensure-folder` for user-facing folders the agent is asked to create."
tags        = ["storage", "folder", "create", "new", "workspace", "tree"]
accepts     = ["application/json"]
emits       = ["application/json"]
idempotent  = false
requires    = []
search_keywords = ["create folder", "new folder", "make folder", "add folder", "workspace folder"]

[[tools]]
name = "create_folder"
description = "Create an empty folder in the workspace tree. Pass `name` (required) and optionally `parent_id` (ULID of the parent folder; omit/null for the root). Returns the new folder's ULID, name, and virtual_path."

[tools.input_schema]
type = "object"
required = ["name"]

[tools.input_schema.properties.name]
type = "string"
description = "Folder name (e.g. \"Projects\" or \"Q3 reports\")."

[tools.input_schema.properties.parent_id]
type = "string"
description = "Optional parent folder ULID. Omit or pass null to create the folder at the workspace root."

[config]
op = "create_folder"
