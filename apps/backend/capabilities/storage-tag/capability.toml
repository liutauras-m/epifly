schema_version = "2.0"
name        = "storage-tag"
version     = "0.1.0"
namespace   = "storage.object.tag"
category    = "storage"
kind        = "native"
description = "Attach key-value metadata tags to a workspace file via a JSON sidecar."
tags        = ["storage", "tag", "metadata", "label"]
accepts     = ["application/json"]
emits       = ["application/json"]
idempotent  = true
requires    = []
search_keywords = ["tag", "label", "metadata", "annotate file"]

[[tools]]
name = "tag_object"
description = "Write tags (key-value pairs) to a .meta.json sidecar next to the target file."

[tools.input_schema]
type = "object"
required = ["path"]

[tools.input_schema.properties.path]
type = "string"
description = "Workspace-relative path of the file to tag"

[tools.input_schema.properties.tags]
type = "object"
description = "Arbitrary key-value pairs to store as metadata"

[config]
op = "tag_object"
