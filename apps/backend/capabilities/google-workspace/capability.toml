schema_version = "2.0"
name        = "google-workspace"
version     = "0.1.0"
namespace   = "deliver.google.workspace"
category    = "deliver"
kind        = "mcp"
enabled     = false
description = "Google Workspace integration — read/write Google Docs, Sheets, Drive files, and send Gmail messages via the Google API (OAuth2)."
tags        = ["productivity", "google", "docs", "sheets", "gmail"]
emits       = ["application/json"]
idempotent  = false
requires    = []

[[tools]]
name = "list_files"
description = "List files in Google Drive."

[tools.input_schema]
type = "object"

[tools.input_schema.properties.folder_id]
type = "string"
description = "Google Drive folder ID (default is root)"

[tools.input_schema.properties.page_size]
type = "integer"
description = "Maximum files to return (max 100)"

[[tools]]
name = "read_document"
description = "Read text content of a Google Docs document."

[tools.input_schema]
type = "object"
required = ["document_id"]

[tools.input_schema.properties.document_id]
type = "string"
description = "Google Docs document ID"

[[tools]]
name = "append_to_sheet"
description = "Append rows to a Google Sheets spreadsheet."

[tools.input_schema]
type = "object"
required = ["spreadsheet_id", "range", "values"]

[tools.input_schema.properties.spreadsheet_id]
type = "string"

[tools.input_schema.properties.range]
type = "string"
description = "A1 notation range (e.g. Sheet1!A:D)"

[tools.input_schema.properties.values]
type = "array"
items = {type = "array", items = {type = "string"}}

[[tools]]
name = "send_email"
description = "Send an email via Gmail."

[tools.input_schema]
type = "object"
required = ["to", "subject", "body"]

[tools.input_schema.properties.to]
type = "string"

[tools.input_schema.properties.subject]
type = "string"

[tools.input_schema.properties.body]
type = "string"

[config]
auth_provider = "oauth2"
scopes = [
    "https://www.googleapis.com/auth/drive.readonly",
    "https://www.googleapis.com/auth/documents.readonly",
    "https://www.googleapis.com/auth/spreadsheets",
    "https://www.googleapis.com/auth/gmail.send",
]
