name = "ocr-service"
version = "1.0.0"
description = "General-purpose OCR for raw unstructured text extraction from any image or scanned document. Returns plain text — no structured fields. For invoices or documents requiring structured output, use invoice-processing instead."
kind = "chain"
tags = ["ocr", "vision", "text-extraction", "document", "general-purpose"]
search_keywords = [
    "OCR", "optical character recognition", "extract text", "read text from image",
    "scan document", "handwritten text", "scanned page", "text recognition",
    "raw text", "unstructured text", "plain text from document",
    "meeting agenda", "letter", "handwritten note", "signage", "label",
]

[[tools]]
name = "extract_text"
description = "Extract raw plain text from an image or scanned document using Claude vision. Returns unstructured text. Input: image_path — local path or URL. Set preserve_layout=true to keep whitespace structure."

[tools.input_schema]
type = "object"
required = ["image_path"]

[tools.input_schema.properties.image_path]
type = "string"
description = "Local path or http/https URL to the image or PDF"

[tools.input_schema.properties.preserve_layout]
type = "boolean"
default = false
description = "Preserve whitespace/column layout in output"

[config]
default_model = "claude-sonnet-4-6"
