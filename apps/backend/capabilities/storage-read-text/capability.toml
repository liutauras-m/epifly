schema_version = "2.0"
name        = "storage-read-text"
version     = "1.0.0"
namespace   = "storage.fs.read"
category    = "storage"
kind        = "native"
description = "Read a text file from the tenant workspace filesystem."
tags        = ["storage", "files", "read", "filesystem"]
emits       = ["application/json"]
idempotent  = true
requires    = []
search_keywords = ["read", "file", "load", "open", "text"]

[[tools]]
name = "read_file"
description = "Read text content from a file path within the tenant workspace."

[tools.input_schema]
type = "object"
required = ["path"]

[tools.input_schema.properties.path]
type = "string"
description = "Relative file path within the tenant workspace"

[config]
op = "read_text"
