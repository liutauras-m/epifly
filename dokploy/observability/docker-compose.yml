# Jaeger + OTel collector. Receives OTLP from the agent-gateway.
# Jaeger UI is exposed at traces.${APP_DOMAIN} — gate it behind Dokploy's
# basic-auth middleware in the UI.

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    hostname: conusai-otel
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - jaeger
    networks: [dokploy-network]

  jaeger:
    image: jaegertracing/all-in-one:1.58
    hostname: conusai-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks: [dokploy-network]
    # Public routing managed by Dokploy via dokploy/domains.yaml
    # (sync with: node dokploy/scripts/sync-domains.mjs)

  # ── One-shot domain sync ────────────────────────────────────────────────
  domain-sync:
    image: node:22-alpine
    restart: "no"
    environment:
      APP_DOMAIN: "${APP_DOMAIN:?APP_DOMAIN must be set}"
      DOKPLOY_URL: "${DOKPLOY_URL:?DOKPLOY_URL must be set in Shared Env}"
      DOKPLOY_API_KEY: "${DOKPLOY_API_KEY:?DOKPLOY_API_KEY must be set in Shared Env}"
      DOKPLOY_ENVIRONMENT_ID: "${DOKPLOY_ENVIRONMENT_ID:?DOKPLOY_ENVIRONMENT_ID must be set in Shared Env}"
      DOKPLOY_APP_NAME: observability
    volumes:
      - ../scripts/sync-domains.mjs:/sync.mjs:ro
      - ../domains.yaml:/domains.yaml:ro
    command: ["node", "/sync.mjs", "--app", "observability", "--trigger-redeploy"]
    networks: [dokploy-network]

networks:
  dokploy-network:
    external: true
