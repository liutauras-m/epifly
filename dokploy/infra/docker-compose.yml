# Conusai infra stack — Postgres, Redis, Qdrant, RustFS, Zitadel, Lago.
# Internal-only services have NO traefik labels and NO host ports.
# Cross-stack services resolve each other by `hostname:` over dokploy-network.

# ── Lago shared env anchor ─────────────────────────────────────────────────
# All Lago services (migrate, api, worker, clock) share the same backend env.
# Defined once as a top-level extension field (x-*) so the variable names
# cannot drift between services. The variable names on the LEFT side MUST
# match exactly what Lago's Rails app reads — documented at
# https://docs.getlago.com/guide/self-hosting/docker
# The names on the RIGHT side are OUR Dokploy Shared Env keys.
x-lago-backend-env: &lago-backend-env
  RAILS_ENV: production
  RAILS_LOG_TO_STDOUT: "true"
  # Keep credentials out of DATABASE_URL so URI parsing cannot break when
  # passwords contain reserved characters. libpq reads PG* vars directly.
  DATABASE_URL: "postgresql://conusai-postgres:5432/lago"
  PGHOST: "conusai-postgres"
  PGPORT: "5432"
  PGUSER: "${POSTGRES_USER}"
  PGPASSWORD: "${POSTGRES_PASSWORD}"
  REDIS_URL: "redis://conusai-redis:6379/0"
  LAGO_REDIS_CACHE_URL: "redis://conusai-redis:6379/1"
  SECRET_KEY_BASE: "${LAGO_SECRET_KEY_BASE}"
  # NOTE: Lago expects the LAGO_-prefixed names. Earlier versions of this
  # file used the un-prefixed forms (ENCRYPTION_PRIMARY_KEY, etc.) which
  # Rails silently ignored, falling back to dev defaults — that left
  # ActiveRecord-encrypted columns unrecoverable across deploys.
  LAGO_ENCRYPTION_PRIMARY_KEY: "${LAGO_ENCRYPTION_KEY}"
  LAGO_ENCRYPTION_DETERMINISTIC_KEY: "${LAGO_ENCRYPTION_DET_KEY}"
  LAGO_ENCRYPTION_KEY_DERIVATION_SALT: "${LAGO_ENCRYPTION_SALT}"
  LAGO_RSA_PRIVATE_KEY: "${LAGO_RSA_PRIVATE_KEY}"
  LAGO_DISABLE_SIGNUP: "true"
  LAGO_SIDEKIQ_WEB: "false"
  LAGO_DISABLE_PDF_GENERATION: "true"
  LAGO_USE_AWS_S3: "false"

services:
  # ── Postgres (shared by Zitadel, Lago, future apps) ──────────────────────
  postgres:
    image: postgres:17-alpine
    hostname: conusai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-conusai}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in Dokploy Shared Environment}"
      POSTGRES_DB: "${POSTGRES_DB:-conusai}"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-conusai} -d $${POSTGRES_DB:-conusai}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks: [dokploy-network]

  # ── Postgres password sync (runs every deploy) ───────────────────────────
  # The official `postgres` image only honours $POSTGRES_PASSWORD on the very
  # first initdb. If the value in Shared Env ever drifts from what's baked
  # into the volume (regenerated, re-pasted, project recreated, etc.),
  # Zitadel and Lago crash-loop with `password authentication failed for user
  # "conusai" (SQLSTATE 28P01)`.
  #
  # This one-shot reconciles the in-DB password to match $POSTGRES_PASSWORD on
  # every deploy. It uses the local Unix socket inside the running postgres
  # container, where pg_hba.conf's first line is `local all all trust` (the
  # postgres image default) — so the ALTER USER works even when the current
  # password no longer matches. The unix socket is reachable only from inside
  # the container itself, so this is not a credential-bypass risk.
  pg-password-sync:
    image: docker:27-cli
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-conusai}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in Shared Env}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        CID=$$(docker ps --filter "label=com.docker.compose.service=postgres" --format '{{.ID}}' | head -1)
        if [ -z "$$CID" ]; then
          echo "✗ conusai-postgres container not found" >&2
          exit 1
        fi
        # Pass the new password through `docker exec -e` so it lives only in
        # psql's env (never in argv / process list). psql's `\getenv` reads it
        # safely; `:'name'` performs proper SQL string quoting.
        docker exec -i \
          -e PGUSER="$$POSTGRES_USER" \
          -e NEW_PG_PASSWORD="$$POSTGRES_PASSWORD" \
          "$$CID" \
          psql -v ON_ERROR_STOP=1 -h /var/run/postgresql -d postgres <<'SQL'
        \getenv new_password NEW_PG_PASSWORD
        ALTER USER current_user WITH PASSWORD :'new_password';
        SQL
        echo "✓ Postgres password synced to current Shared Env value"
    networks: [dokploy-network]

  # ── Redis (Lago queues) ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    hostname: conusai-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [dokploy-network]

  # ── Qdrant (vector store) ────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.17.0
    hostname: conusai-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'echo > /dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [dokploy-network]

  # ── RustFS perms fixer (runs once) ───────────────────────────────────────
  rustfs-perms:
    image: alpine:3
    user: root
    command: ["sh", "-c", "chown -R 10001:10001 /fix_path && echo done"]
    volumes:
      - rustfs_data:/fix_path
    restart: "no"
    networks: [dokploy-network]

  # ── RustFS (S3-compatible object storage) ────────────────────────────────
  rustfs:
    image: rustfs/rustfs:latest
    hostname: conusai-rustfs
    restart: unless-stopped
    depends_on:
      rustfs-perms:
        condition: service_completed_successfully
    environment:
      RUSTFS_ACCESS_KEY: "${AWS_ACCESS_KEY_ID}"
      RUSTFS_SECRET_KEY: "${AWS_SECRET_ACCESS_KEY}"
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_CONSOLE_ENABLE: "true"
    command: ["--console-enable", "/data"]
    volumes:
      - rustfs_data:/data
    # No healthcheck: the rustfs:latest image is minimal (no curl/wget/bash)
    # so we can't reliably probe inside the container. Rely on Docker's
    # restart policy + Dokploy monitoring to detect failures.
    networks: [dokploy-network]
    # Public routing managed by Dokploy via dokploy/domains.yaml
    # (sync with: node dokploy/scripts/sync-domains.mjs)

  # ── Zitadel (identity provider) ──────────────────────────────────────────
  zitadel:
    image: ghcr.io/zitadel/zitadel:v2.68.0
    hostname: conusai-zitadel
    restart: unless-stopped
    command: >
      start-from-init
      --masterkey "${ZITADEL_MASTERKEY}"
      --tlsMode external
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: conusai-postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: "${POSTGRES_USER}"
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: "${POSTGRES_PASSWORD}"
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: "${POSTGRES_USER}"
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: "${POSTGRES_PASSWORD}"
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALSECURE: "true"
      ZITADEL_EXTERNALPORT: 443
      ZITADEL_EXTERNALDOMAIN: "auth.${APP_DOMAIN}"
      # Share session cookie across the whole epifly zone so the web app
      # and Lago portal participate in the same Zitadel SSO session.
      ZITADEL_OIDC_DEFAULTLOGINURLV2: "https://auth.${APP_DOMAIN}/ui/login/"
      # Tell the Zitadel 'ready' healthcheck binary to connect via HTTP
      # (TLS is terminated by Traefik; --tlsMode external means no TLS here).
      ZITADEL_TLS_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      pg-password-sync:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 15s
      timeout: 5s
      retries: 30
    networks: [dokploy-network]
    # Public routing managed by Dokploy via dokploy/domains.yaml
    # Note: zitadel needs scheme=h2c for gRPC. Configure via Dokploy domain
    # advanced setting once the API supports it; for now the HTTP/2 H2C
    # autodetection in Traefik handles the OIDC/login flow correctly.

  # ── Lago DB migrations (one-shot, runs on every deploy) ─────────────────
  # The official getlago/api start scripts do NOT run migrations on boot;
  # upstream's compose splits migrations into a dedicated service that runs
  # `./scripts/migrate.sh` (which does `rails db:migrate` + ClickHouse
  # migrations + extra setup). Without it, lago-api boots against an empty
  # `lago` database, `/health` 5xx's, and the container is marked unhealthy.
  lago-migrate:
    image: getlago/api:v1.46.0
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      pg-password-sync:
        condition: service_completed_successfully
    environment:
      <<: *lago-backend-env
    command: ["./scripts/migrate.sh"]
    networks: [dokploy-network]

  # ── Lago API (billing) ───────────────────────────────────────────────────
  lago-api:
    image: getlago/api:v1.46.0
    hostname: conusai-lago-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pg-password-sync:
        condition: service_completed_successfully
      lago-migrate:
        condition: service_completed_successfully
    command: ["./scripts/start.api.sh"]
    environment:
      <<: *lago-backend-env
      LAGO_API_URL: "https://billing.${APP_DOMAIN}"
      LAGO_FRONT_URL: "https://billing.${APP_DOMAIN}"
    volumes:
      # Lago writes uploaded files / PDFs here when LAGO_USE_AWS_S3=false.
      # Even with PDF generation disabled, the storage adapter is
      # initialised on boot and needs a writable path.
      - lago_storage_data:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 60s
      # `start_period` is honoured by Docker 25+ (Dokploy ships 27+).
      # During this window failing probes do NOT count toward retries —
      # Rails cold-boot on a small VM regularly takes 60-90 s.
      start_period: 120s
      start_interval: 2s
    networks: [dokploy-network]
    # Public routing managed by Dokploy via dokploy/domains.yaml

  # ── Lago Worker (Sidekiq) ────────────────────────────────────────────────
  lago-worker:
    image: getlago/api:v1.46.0
    hostname: conusai-lago-worker
    restart: unless-stopped
    command: ["./scripts/start.worker.sh"]
    depends_on:
      lago-api:
        condition: service_healthy
      lago-migrate:
        condition: service_completed_successfully
    environment:
      <<: *lago-backend-env
      LAGO_API_URL: "https://billing.${APP_DOMAIN}"
    volumes:
      - lago_storage_data:/app/storage
    healthcheck:
      # start.worker.sh exposes a Sidekiq health probe on :8080 — official
      # compose uses the same one.
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || exit 1"]
      interval: 10s
      timeout: 60s
      start_period: 120s
      start_interval: 2s
    networks: [dokploy-network]

  # ── Lago Clock (recurring jobs) ──────────────────────────────────────────
  # Drives the billing/anniversary/subscription cron schedule. Skipping it
  # silently breaks subscription renewals — billing customers will not be
  # invoiced. Upstream's compose ships this as a first-class service.
  lago-clock:
    image: getlago/api:v1.46.0
    hostname: conusai-lago-clock
    restart: unless-stopped
    command: ["./scripts/start.clock.sh"]
    depends_on:
      lago-api:
        condition: service_healthy
      lago-migrate:
        condition: service_completed_successfully
    environment:
      <<: *lago-backend-env
      LAGO_API_URL: "https://billing.${APP_DOMAIN}"
    networks: [dokploy-network]

  # ── One-shot domain sync ────────────────────────────────────────────────
  # On every deploy: registers this app's public hostnames in Dokploy from
  # `dokploy/domains.yaml`. If anything changes, triggers a self-redeploy
  # so Traefik labels are regenerated immediately. Runs once and exits.
  domain-sync:
    image: node:22-alpine
    restart: "no"
    environment:
      APP_DOMAIN: "${APP_DOMAIN:?APP_DOMAIN must be set}"
      DOKPLOY_URL: "${DOKPLOY_URL:?DOKPLOY_URL must be set in Shared Env}"
      DOKPLOY_API_KEY: "${DOKPLOY_API_KEY:?DOKPLOY_API_KEY must be set in Shared Env}"
      DOKPLOY_ENVIRONMENT_ID: "${DOKPLOY_ENVIRONMENT_ID:?DOKPLOY_ENVIRONMENT_ID must be set in Shared Env}"
      DOKPLOY_APP_NAME: infra
    volumes:
      - ../scripts/sync-domains.mjs:/sync.mjs:ro
      - ../domains.yaml:/domains.yaml:ro
    command: ["node", "/sync.mjs", "--app", "infra", "--trigger-redeploy"]
    networks: [dokploy-network]

volumes:
  postgres_data:
    external: true
    name: conusai_postgres_data
  redis_data:
    external: true
    name: conusai_redis_data
  qdrant_data:
    external: true
    name: conusai_qdrant_data
  rustfs_data:
    external: true
    name: conusai_rustfs_data
  lago_storage_data:
    external: true
    name: conusai_lago_storage_data

networks:
  dokploy-network:
    external: true
