name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

defaults:
  run:
    working-directory: .

jobs:
  fmt:
    name: Rust Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - run: cargo fmt --all -- --check

  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev cmake clang

      - run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> apps/backend/target"

      - run: cargo check --workspace --all-targets
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Rust Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev cmake clang

      - run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> apps/backend/target"

      - run: cargo test --workspace --lib

      - name: Tenant header rejected in prod (Phase 7 gate)
        run: cargo test -p agent-gateway tenant_header_rejected_in_prod tenant_header_lowercase_rejected_in_prod tenant_header_honored_in_dev

      - name: Routing-quality regression (PR 4.2)
        run: cargo test -p agent-gateway --test routing_quality --release

      - name: Upload routing-quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: routing-quality-report
          path: apps/backend/target/routing_quality.md
          if-no-files-found: ignore

      - name: Embeddings feature guard (PR 1.1.4)
        run: cargo build -p agent-gateway && grep -q fastembed apps/backend/target/debug/agent-gateway

  frontend:
    name: Frontend Build, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Cross-app parity lint (PR 4.4)
        run: node scripts/check-cross-app-imports.mjs

      - name: Lint (biome)
        run: pnpm -w exec biome check --no-errors-on-unmatched .

      - name: Type check
        run: pnpm -r check-types

      - name: Test
        run: pnpm -r test

      - name: Build all packages
        run: pnpm -r build

  e2e:
    name: Web E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Build web for preview
        run: pnpm --filter web build

      - name: Run Playwright smoke tests
        run: pnpm --filter web test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [check, frontend]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs full history

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev cmake clang

      - run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> apps/backend/target"

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Rust audit (fail on high+)
        run: cargo audit --deny warnings

      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: pnpm audit (prod)
        run: pnpm audit --prod

      - name: OSV Scanner (JS)
        uses: google/osv-scanner-action@v1
        with:
          scan-args: |-
            --lockfile=pnpm-lock.yaml
            --format=table
          results-file: osv-results.json
        continue-on-error: false

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: No dev-auth in production release
        run: |
          # The 'dev-auth' Cargo feature must not appear in [features] default
          # of agent-gateway. A grep for 'default.*dev-auth' in the Cargo.toml is
          # sufficient; the feature may exist but must never be in the default list.
          if grep -E '^\s*default\s*=.*dev-auth' \
              apps/backend/crates/agent-gateway/Cargo.toml; then
            echo "ERROR: dev-auth is in default features — must not ship to production"
            exit 1
          fi
          echo "OK: dev-auth is not in default features"

      - name: Assert no auto-provision in prod configs
        run: node scripts/assert-no-auto-provision-in-prod.mjs

      - name: Assert no client_secret in web bundle (build required)
        run: |
          if [ -d "apps/web/.svelte-kit/output/client" ]; then
            if grep -rqiE "ZITADEL.*SECRET|client_secret|MGMT_PAT|BOOTSTRAP_PAT" \
                apps/web/.svelte-kit/output/client 2>/dev/null; then
              echo "ERROR: secret found in web client bundle"
              exit 1
            fi
            echo "OK: no secrets in web client bundle"
          else
            echo "SKIP: web bundle not built in this job"
          fi

  types-drift:
    name: OpenAPI types not stale
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev cmake clang

      - run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> apps/backend/target"

      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @conusai/types prebuild
      - run: git diff --exit-code packages/types/src

  lint-no-stale-trees:
    name: No stale root capability/crate trees
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if stale root trees reappear
        run: |
          if git ls-files | grep -qE '^(capabilities/|crates/)'; then
            echo "ERROR: stale root capabilities/ or crates/ tree detected."
            git ls-files | grep -E '^(capabilities/|crates/)'
            exit 1
          fi
          echo "Clean."

  evals:
    name: Invoice Evals
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [check, test]
    steps:
      - uses: actions/checkout@v4

      - name: Skip if no API key (forks)
        id: gate
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install system dependencies
        if: steps.gate.outputs.skip == 'false'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev cmake clang

      - if: steps.gate.outputs.skip == 'false'
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        if: steps.gate.outputs.skip == 'false'
        with:
          shared-key: evals

      - name: Build evals
        if: steps.gate.outputs.skip == 'false'
        run: cargo build --release --bin evals

      - name: Run eval suite
        if: steps.gate.outputs.skip == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: ./apps/backend/target/release/evals run --suite invoice
        continue-on-error: true
