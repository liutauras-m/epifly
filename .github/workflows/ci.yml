name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

defaults:
  run:
    working-directory: apps/backend

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - run: cargo fmt --all -- --check

  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev cmake clang

      - name: Set up Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "apps/backend -> target"

      - name: cargo check
        run: cargo check --workspace --all-targets

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev cmake clang

      - name: Set up Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "apps/backend -> target"

      - name: cargo test (unit only)
        run: cargo test --workspace --lib

  evals:
    name: Invoice Evals
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [check, test]
    steps:
      - uses: actions/checkout@v4

      - name: Skip if no API key (forks)
        id: gate
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "ANTHROPIC_API_KEY not set — skipping evals."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install system dependencies
        if: steps.gate.outputs.skip == 'false'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev cmake clang

      - name: Set up Rust toolchain
        if: steps.gate.outputs.skip == 'false'
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        if: steps.gate.outputs.skip == 'false'
        with:
          shared-key: evals
          workspaces: "apps/backend -> target"

      - name: cargo build evals
        if: steps.gate.outputs.skip == 'false'
        run: cargo build --release --bin evals

      - name: Run invoice eval suite
        if: steps.gate.outputs.skip == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: ./target/release/evals run --suite invoice
        continue-on-error: true
