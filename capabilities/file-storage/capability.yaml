name: file-storage
version: "0.1.0"
description: >
  S3-compatible object storage (MinIO/AWS S3).
  Upload, download, list, delete objects and generate presigned URLs.
kind: mcp
tags:
  - storage
  - s3
  - files

tools:
  - name: upload_file
    description: Upload a file to object storage and return its key.
    input_schema:
      type: object
      required: [local_path, key]
      properties:
        local_path: { type: string }
        key: { type: string }
        bucket: { type: string }

  - name: download_file
    description: Download a file from object storage to a local path.
    input_schema:
      type: object
      required: [key, local_path]
      properties:
        key: { type: string }
        local_path: { type: string }
        bucket: { type: string }

  - name: presigned_url
    description: Generate a presigned URL for temporary public access to an object.
    input_schema:
      type: object
      required: [key]
      properties:
        key: { type: string }
        expires_secs: { type: integer, default: 3600 }
        bucket: { type: string }

config:
  endpoint: "${S3_ENDPOINT}"
  bucket: "${S3_BUCKET}"
