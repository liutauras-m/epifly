version: "3.9"

services:
  # ── Vector DB ─────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: conusai-qdrant
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["infra", "full"]

  # ── Object Storage ────────────────────────────────────────────────────────
  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: conusai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["infra", "full"]

  # ── MinIO bucket initialisation ───────────────────────────────────────────
  minio-init:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: conusai-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://conusai-minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/conusai &&
        echo 'bucket conusai ready'
      "
    profiles: ["infra", "full"]

  # ── Agent Gateway ─────────────────────────────────────────────────────────
  agent-gateway:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: gateway
    container_name: conusai-gateway
    depends_on:
      qdrant:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    env_file:
      - path: .env.local
        required: false
      - path: .env
        required: false
    environment:
      QDRANT_URL: "http://conusai-qdrant:6333"
      QDRANT_GRPC_URL: "http://conusai-qdrant:6334"
      MINIO_ENDPOINT: "http://conusai-minio:9000"
      MINIO_BUCKET: "conusai"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      CONUSAI_WORKSPACE_ROOT: "/tmp/conusai/workspaces"
      OTLP_ENDPOINT: "http://conusai-otel:4317"
      UI_SESSION_KEY: "${UI_SESSION_KEY:-conusai-foundry-dev-secret-change-me-32b}"
    ports:
      - "8080:8080"
    volumes:
      - ./apps/backend/capabilities:/app/capabilities
      - ./apps/backend/crates/agent-gateway/assets:/app/ui-assets:ro
    restart: unless-stopped
    profiles: ["full"]

  # ── Observability ─────────────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: conusai-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "14317:4317"    # OTLP gRPC (host-side mapped to avoid conflict with otel-collector)
    profiles: ["observability", "full"]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    container_name: conusai-otel
    depends_on:
      - jaeger
    volumes:
      - ./apps/backend/scripts/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # gRPC OTLP
      - "4318:4318"   # HTTP OTLP
    profiles: ["observability", "full"]

volumes:
  qdrant_data:
  minio_data:
