services:
  # ── Postgres (shared: Zitadel + Lago) ────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: conusai-postgres
    profiles: ["infra", "full"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-conusai}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-conusai}"
      POSTGRES_DB: "${POSTGRES_DB:-conusai}"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-conusai}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Redis (Lago) ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: conusai-redis
    profiles: ["infra", "full"]
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Zitadel identity provider ─────────────────────────────────────────────
  zitadel:
    image: ghcr.io/zitadel/zitadel:v2.68.0
    container_name: conusai-zitadel
    profiles: ["infra", "full"]
    restart: unless-stopped
    command: start-from-init --masterkey "${ZITADEL_MASTERKEY:-MasterkeyNeedsToHave32Characters}" --tlsMode disabled
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: conusai-postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: "${POSTGRES_USER:-conusai}"
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: "${POSTGRES_PASSWORD:-conusai}"
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: "${POSTGRES_USER:-conusai}"
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: "${POSTGRES_PASSWORD:-conusai}"
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_EXTERNALPORT: 8085
      ZITADEL_EXTERNALDOMAIN: localhost
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8085:8080"
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 5s
      retries: 30

  # ── Lago API (billing) ────────────────────────────────────────────────────
  lago-api:
    image: getlago/api:v1.30.0
    container_name: conusai-lago-api
    profiles: ["infra", "full"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RAILS_ENV: production
      LAGO_API_URL: "${LAGO_API_URL:-http://localhost:3010}"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-conusai}:${POSTGRES_PASSWORD:-conusai}@conusai-postgres:5432/lago"
      REDIS_URL: "redis://conusai-redis:6379/0"
      SECRET_KEY_BASE: "${LAGO_SECRET_KEY_BASE:-changeme_lago_secret_key_base_at_least_64_chars_long_here}"
      ENCRYPTION_DETERMINISTIC_KEY: "${LAGO_ENCRYPTION_DET_KEY:-changeme_det_key_32_chars_here}"
      ENCRYPTION_KEY_DERIVATION_SALT: "${LAGO_ENCRYPTION_SALT:-changeme_salt_32}"
      ENCRYPTION_PRIMARY_KEY: "${LAGO_ENCRYPTION_KEY:-changeme_primary_32_chars_here_!}"
      STRIPE_API_KEY: "${STRIPE_SECRET_KEY:-}"
      LAGO_DISABLE_SIGNUP: "true"
    ports:
      - "3010:3000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Lago Worker ───────────────────────────────────────────────────────────
  lago-worker:
    image: getlago/api:v1.30.0
    container_name: conusai-lago-worker
    profiles: ["infra", "full"]
    restart: unless-stopped
    command: ["bundle", "exec", "sidekiq"]
    depends_on:
      lago-api:
        condition: service_healthy
    environment:
      RAILS_ENV: production
      DATABASE_URL: "postgresql://${POSTGRES_USER:-conusai}:${POSTGRES_PASSWORD:-conusai}@conusai-postgres:5432/lago"
      REDIS_URL: "redis://conusai-redis:6379/0"
      SECRET_KEY_BASE: "${LAGO_SECRET_KEY_BASE:-changeme_lago_secret_key_base_at_least_64_chars_long_here}"
      ENCRYPTION_DETERMINISTIC_KEY: "${LAGO_ENCRYPTION_DET_KEY:-changeme_det_key_32_chars_here}"
      ENCRYPTION_KEY_DERIVATION_SALT: "${LAGO_ENCRYPTION_SALT:-changeme_salt_32}"
      ENCRYPTION_PRIMARY_KEY: "${LAGO_ENCRYPTION_KEY:-changeme_primary_32_chars_here_!}"

  # ── Vector store ──────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: conusai-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-lc", "echo > /dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Object Storage (S3-compatible — RustFS drop-in) ───────────────────────
  rustfs:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: conusai-rustfs
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${AWS_ACCESS_KEY_ID:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${AWS_SECRET_ACCESS_KEY:-minioadmin}"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - rustfs_data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Bucket initialisation ─────────────────────────────────────────────────
  rustfs-init:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: conusai-rustfs-init
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://conusai-rustfs:9000 ${AWS_ACCESS_KEY_ID:-minioadmin} ${AWS_SECRET_ACCESS_KEY:-minioadmin} &&
        mc mb --ignore-existing local/workspace &&
        echo 'bucket workspace ready'
      "
    restart: on-failure

  # ── Marker PDF-to-markdown service (optional — profile: marker) ──────────
  marker-api:
    image: ghcr.io/vikparuchuri/marker:latest
    container_name: conusai-marker
    profiles: ["marker"]
    restart: unless-stopped
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Agent Gateway ─────────────────────────────────────────────────────────
  agent-gateway:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: gateway
    container_name: conusai-gateway
    depends_on:
      qdrant:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
    env_file:
      - path: .env.local
        required: false
      - path: .env
        required: false
    environment:
      QDRANT_URL: "http://conusai-qdrant:6334"
      S3_ENDPOINT: "http://conusai-rustfs:9000"
      S3_BUCKET: "workspace"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-minioadmin}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-minioadmin}"
      REDB_PATH: "/data/conusai.redb"
      MARKER_URL: "http://conusai-marker:8080"
      WORKSPACES_ROOT: "/app/workspaces"
      OTLP_ENDPOINT: "http://conusai-otel:4317"
      UI_SESSION_KEY: "${UI_SESSION_KEY:-conusai-foundry-dev-secret-change-me-32b}"
      WEB_ORIGIN: "${WEB_ORIGIN:-http://localhost:3000,http://localhost:5173,https://tauri.localhost,tauri://localhost}"
      EMBEDDING_BACKEND: "${EMBEDDING_BACKEND:-openai}"
    ports:
      - "8080:8080"
    volumes:
      - redb_data:/data
      - ./apps/backend/capabilities:/app/capabilities
      - ./apps/backend/crates/agent-gateway/assets:/app/ui-assets:ro
      - ./workspaces:/app/workspaces:rw
    restart: unless-stopped

  # ── current-time: self-registering MCP capability service ────────────────
  current-time:
    build:
      context: ./services/current-time
    container_name: conusai-current-time
    restart: unless-stopped
    environment:
      GATEWAY_URL: "http://conusai-gateway:8080"
      PLATFORM_ADMIN_TOKEN: "${PLATFORM_ADMIN_TOKEN:-}"
      SERVICE_URL: "http://conusai-current-time:8082"
    ports:
      - "8082:8082"
    depends_on:
      agent-gateway:
        condition: service_started

  # ── SvelteKit Web App (optional — profile: web) ──────────────────────────
  web:
    image: node:22-slim
    container_name: conusai-web
    profiles: ["web", "full"]
    working_dir: /app
    command: node apps/web/build
    volumes:
      - .:/app:ro
    ports:
      - "3000:3000"

  # ── Observability ─────────────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: conusai-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "14317:4317"    # OTLP gRPC (host-side mapped to avoid conflict with otel-collector)
    profiles: ["observability"]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    container_name: conusai-otel
    profiles: ["observability"]
    depends_on:
      - jaeger
    volumes:
      - ./apps/backend/scripts/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # gRPC OTLP
      - "4318:4318"   # HTTP OTLP

volumes:
  qdrant_data:
  rustfs_data:
  redb_data:
  postgres_data:
