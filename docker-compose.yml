services:
  # ── Vector store ──────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: conusai-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-lc", "echo > /dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Object Storage (S3-compatible — RustFS drop-in) ───────────────────────
  rustfs:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: conusai-rustfs
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${AWS_ACCESS_KEY_ID:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${AWS_SECRET_ACCESS_KEY:-minioadmin}"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - rustfs_data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Bucket initialisation ─────────────────────────────────────────────────
  rustfs-init:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: conusai-rustfs-init
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://conusai-rustfs:9000 ${AWS_ACCESS_KEY_ID:-minioadmin} ${AWS_SECRET_ACCESS_KEY:-minioadmin} &&
        mc mb --ignore-existing local/workspace &&
        echo 'bucket workspace ready'
      "
    restart: on-failure

  # ── Marker PDF-to-markdown service (optional — profile: marker) ──────────
  marker-api:
    image: ghcr.io/vikparuchuri/marker:latest
    container_name: conusai-marker
    profiles: ["marker"]
    restart: unless-stopped
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Agent Gateway ─────────────────────────────────────────────────────────
  agent-gateway:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: gateway
    container_name: conusai-gateway
    depends_on:
      qdrant:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
    env_file:
      - path: .env.local
        required: false
      - path: .env
        required: false
    environment:
      QDRANT_URL: "http://conusai-qdrant:6334"
      S3_ENDPOINT: "http://conusai-rustfs:9000"
      S3_BUCKET: "${S3_BUCKET:-workspace}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-minioadmin}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-minioadmin}"
      REDB_PATH: "/data/conusai.redb"
      MARKER_URL: "http://conusai-marker:8080"
      WORKSPACES_ROOT: "/app/workspaces"
      OTLP_ENDPOINT: "http://conusai-otel:4317"
      UI_SESSION_KEY: "${UI_SESSION_KEY:-conusai-foundry-dev-secret-change-me-32b}"
      WEB_ORIGIN: "${WEB_ORIGIN:-http://localhost:3000,http://localhost:5173,https://tauri.localhost,tauri://localhost}"
      EMBEDDING_BACKEND: "${EMBEDDING_BACKEND:-openai}"
    ports:
      - "8080:8080"
    volumes:
      - redb_data:/data
      - ./apps/backend/capabilities:/app/capabilities
      - ./apps/backend/crates/agent-gateway/assets:/app/ui-assets:ro
      - ./workspaces:/app/workspaces:rw
    restart: unless-stopped

  # ── current-time: self-registering MCP capability service ────────────────
  current-time:
    build:
      context: ./services/current-time
    container_name: conusai-current-time
    restart: unless-stopped
    environment:
      GATEWAY_URL: "http://conusai-gateway:8080"
      PLATFORM_ADMIN_TOKEN: "${PLATFORM_ADMIN_TOKEN:-}"
      SERVICE_URL: "http://conusai-current-time:8082"
    ports:
      - "8082:8082"
    depends_on:
      agent-gateway:
        condition: service_started

  # ── SvelteKit Web App (optional — profile: web) ──────────────────────────
  web:
    image: node:22-slim
    container_name: conusai-web
    profiles: ["web"]
    working_dir: /app
    command: node apps/web/build
    volumes:
      - .:/app:ro
    ports:
      - "3000:3000"

  # ── Observability ─────────────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: conusai-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "14317:4317"    # OTLP gRPC (host-side mapped to avoid conflict with otel-collector)
    profiles: ["observability"]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    container_name: conusai-otel
    profiles: ["observability"]
    depends_on:
      - jaeger
    volumes:
      - ./apps/backend/scripts/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # gRPC OTLP
      - "4318:4318"   # HTTP OTLP

volumes:
  qdrant_data:
  rustfs_data:
  redb_data:
