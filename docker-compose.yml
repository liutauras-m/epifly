version: "3.9"

services:
  # ── Postgres (TimescaleDB + pgvector + pgvectorscale) ─────────────────────
  postgres:
    image: timescale/timescaledb-ha:pg17
    container_name: conusai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: conusai
      POSTGRES_USER: conusai
      POSTGRES_PASSWORD: conusai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./workspaces:/app/workspaces:rw
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conusai -d conusai"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles: ["infra", "full"]

  # ── Object Storage ────────────────────────────────────────────────────────
  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: conusai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["infra", "full"]

  # ── MinIO bucket initialisation ───────────────────────────────────────────
  minio-init:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: conusai-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://conusai-minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/conusai &&
        echo 'bucket conusai ready'
      "
    profiles: ["infra", "full"]

  # ── Agent Gateway ─────────────────────────────────────────────────────────
  agent-gateway:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: gateway
    container_name: conusai-gateway
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    env_file:
      - path: .env.local
        required: false
      - path: .env
        required: false
    environment:
      DATABASE_URL: "postgres://conusai:conusai@conusai-postgres:5432/conusai"
      MINIO_ENDPOINT: "http://conusai-minio:9000"
      MINIO_BUCKET: "conusai"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      WORKSPACES_ROOT: "/app/workspaces"
      OTLP_ENDPOINT: "http://conusai-otel:4317"
      UI_SESSION_KEY: "${UI_SESSION_KEY:-conusai-foundry-dev-secret-change-me-32b}"
      EMBEDDING_BACKEND: "local"
    ports:
      - "8080:8080"
    volumes:
      - ./apps/backend/capabilities:/app/capabilities
      - ./apps/backend/crates/agent-gateway/assets:/app/ui-assets:ro
    restart: unless-stopped
    profiles: ["full"]

  # ── current-time: self-registering MCP capability service ────────────────
  current-time:
    build:
      context: ./services/current-time
    container_name: conusai-current-time
    restart: unless-stopped
    environment:
      GATEWAY_URL: "http://conusai-gateway:8080"
      PLATFORM_ADMIN_TOKEN: "${PLATFORM_ADMIN_TOKEN:-}"
      SERVICE_URL: "http://conusai-current-time:8082"
      # Deprecated aliases — kept for one release, remove after migration:
      # CONUSAI_PLATFORM_URL: "http://conusai-gateway:8080"
      # CONUSAI_PLATFORM_TOKEN: "${PLATFORM_ADMIN_TOKEN:-}"
      # CONUSAI_SERVICE_URL: "http://conusai-current-time:8082"
      # CONUSAI_TENANT_SCOPE: "tenant-abc,tenant-xyz"  # uncomment to scope to specific tenants
    ports:
      - "8082:8082"
    profiles: ["full"]
    depends_on:
      agent-gateway:
        condition: service_started

  # ── Observability ─────────────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: conusai-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "14317:4317"    # OTLP gRPC (host-side mapped to avoid conflict with otel-collector)
    profiles: ["observability", "full"]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    container_name: conusai-otel
    depends_on:
      - jaeger
    volumes:
      - ./apps/backend/scripts/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # gRPC OTLP
      - "4318:4318"   # HTTP OTLP
    profiles: ["observability", "full"]

volumes:
  postgres_data:
  minio_data:
