version: "3.9"

services:
  # ── Vector DB ─────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: conusai-qdrant
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["infra", "full"]

  # ── Object Storage ────────────────────────────────────────────────────────
  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: conusai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["infra", "full"]

  # ── Agent Gateway ─────────────────────────────────────────────────────────
  agent-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: gateway
    container_name: conusai-gateway
    depends_on:
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - ./capabilities:/app/capabilities:ro
    restart: unless-stopped
    profiles: ["full"]

  # ── Observability (optional) ───────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    container_name: conusai-otel
    volumes:
      - ./scripts/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # gRPC
      - "4318:4318"   # HTTP
    profiles: ["observability", "full"]

volumes:
  qdrant_data:
  minio_data:
